<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Checker</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card">
        
      <div class="hdrtitle">
        <h2>
           <span> <i class="fas fa-key lock-icon"></i></span> 
           <span id="spantitle">Password Validation</span>
        </h2>
      </div>
        <p class="subtitle">Enter your password to ensure it meets our security criteria.</p>
        
        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password..." autocomplete="off">
        </div>
        
         <div class="chkclrbtns">
            <button id="checkBtn">Verify Password</button>
            <button id="clearBtn">Clear</button>
         </div>
             
        <div id="feedback" class="feedback hidden"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
